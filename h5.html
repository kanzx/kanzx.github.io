<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>真相广传</title>
		<meta charset="utf-8">
		<meta name="keywords" content="真相,良言,福音,自救"/>
		<meta name="description" content="有缘相见不妨静下心来耐心看一看，您会发现惊天黑幕被层层拨开...真相就在眼前！"/>

	<style type="text/css">
		*{margin: 0px;padding: 0px;}
		html,body{width: 100%;height: 100%;}
		#text{color: blue;height: 1.25rem;width: 18.75rem;margin: auto;}
		#main{
			width: 25rem;height: 35rem;
			margin: auto;
			border: solid 0.0625rem;
			border-radius: 1.875rem;
			position: relative;
		}
		audio{width: 3.125rem;height: 6.25rem;float: right;}
		img{
			position: absolute;
			border-radius: 1.875rem;
			width: 100%;height: 100%;
		}
	</style>
	<body>
		<div id="text"><b>等待建设...</b></div>

			<script type="text/javascript">
				if (navigator.userAgent.match(/windows/i) != "Windows"){
					var main_id = document.getElementById("main");
					main_id.style.width="100%";
					main_id.style.height="100%";
				}
			</script>
			<img src="h5img/01.jpg" >
			<audio src="music/隐约想起来.mp3" controls="controls" autoplay=""></audio>
